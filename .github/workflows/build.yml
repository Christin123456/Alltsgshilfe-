name: Build AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Write Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Init TWA
        run: |
          bubblewrap init \
            --manifest "https://christin123456.github.io/Alltsgshilfe-/manifest.json" \
            --directory twa-app
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "1"
          BUBBLEWRAP_USE_SHELL: "1"
      - name: Build AAB
        run: |
          cd twa-app
          bubblewrap build \
            --signingKeyAlias upload \
            --signingKeyPassword android \
            --signingStorePassword android
      - uses: actions/upload-artifact@v4
        with:
          name: alltagshilfe-aab
          path: twa-app/*.aab
