name: Build AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Write Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
      - name: Clone TWA template
        run: git clone https://github.com/GoogleChromeLabs/svgomg-twa twa-app
      - name: Configure TWA
        run: |
          cd twa-app
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 33
            defaultConfig {
              applicationId "io.github.christin123456.alltagshilfe"
              minSdkVersion 19
              targetSdkVersion 33
              versionCode 1
              versionName "1.0"
            }
          }
          EOF
      - name: Build AAB
        run: |
          cd twa-app
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=../upload-keystore.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=upload \
            -Pandroid.injected.signing.key.password=android
      - uses: actions/upload-artifact@v4
        with:
          name: alltagshilfe-aab
          path: twa-app/app/build/outputs/bundle/release
