name: Build AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Write Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
      - name: Init TWA
        run: printf "n\n/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64\n\n\n\n\n\n\n\n" | bubblewrap init --manifest https://christin123456.github.io/Alltsgshilfe-/manifest.json
      - name: Build AAB
        run: bubblewrap build --signingKeyAlias upload --signingKeyPassword android --signingStorePassword android
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
      - uses: actions/upload-artifact@v4
        with:
          name: alltagshilfe-aab
          path: ./*.aab
